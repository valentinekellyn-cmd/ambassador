<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guzalic Luxurious Salon | Ambassador</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
:root {
--bg-dark: #0a0808;
--accent-pink: #c96281;
--glass-border: rgba(255,255,255,0.12);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#0a0808;
color:#fff;
font-family:'Inter',sans-serif;
overflow-x:hidden;
}

.container{max-width:1200px;margin:auto;padding:20px;}

nav{
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:20px;
}

.logo{font-family:'Playfair Display';color:#c96281;}
.nav-links a{color:#aaa;margin-left:20px;text-decoration:none;}
.join-btn{
background:#c96281;
padding:8px 20px;
border-radius:20px;
color:#fff;
}

.hero{padding:80px 0;}
h1{font-size:3rem;font-family:'Playfair Display';}

.btn-primary{
background:#c96281;
padding:15px 25px;
border-radius:10px;
color:white;
border:none;
cursor:pointer;
}

.main-img{width:100%;max-width:500px;border-radius:20px;}

.services-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:60px 0;
}

.service-box{
padding:30px;
border:1px solid var(--glass-border);
border-radius:20px;
}

.apply-section{
padding:60px 0;
}

.form-card{
padding:30px;
border-radius:20px;
border:1px solid var(--glass-border);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:none;
}

.success-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#111;
padding:30px 40px;
border-radius:20px;
border:1px solid #c96281;
transition:0.4s;
z-index:999;
text-align:center;
}

.success-popup.active{
transform:translate(-50%,-50%) scale(1);
}

@media(max-width:768px){
.services-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<nav>
<div class="logo">Guzalic</div>
<div class="nav-links">
<a href="#services">Services</a>
<a href="#apply">Apply</a>
<a href="#apply" class="join-btn">Join Now</a>
</div>
</nav>

<section class="hero">
<h1>Guzalic Luxurious Salon</h1>
<p>Join our ambassador family and enjoy services FREE on your first visit.</p>
</section>

<div style="text-align:center;">
<img src="IMG_4166.jpeg" class="main-img">
</div>

<section class="services-grid" id="services">
<div class="service-box">Hair Services</div>
<div class="service-box">Makeup</div>
<div class="service-box">Nail Art</div>
<div class="service-box">Skin Treatments</div>
</section>

<section class="apply-section" id="apply">
<div class="form-card">

<h2>Ambassador Registration</h2>

<form id="form" action="https://formsubmit.co/ajax/valentinekellyn@gmail.com" method="POST">

<input type="hidden" name="_subject" value="New Ambassador Application">
<input type="hidden" name="_captcha" value="false">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<input type="text" name="city" placeholder="City" required>

<button type="submit" class="btn-primary">Submit Application</button>

</form>

</div>
</section>

</div>

<!-- Success Popup -->
<div class="success-popup" id="popup">
<h2>✨ Application Sent ✨</h2>
<p>Welcome to Guzalic Ambassador Family 💖</p>
</div>

<script>
// FormSubmit AJAX (no redirect)
const form = document.getElementById("form");
const popup = document.getElementById("popup");

form.addEventListener("submit", function(e){
e.preventDefault();

fetch(form.action,{
method:"POST",
body:new FormData(form)
})
.then(()=>{
popup.classList.add("active");
form.reset();

setTimeout(()=>{
popup.classList.remove("active");
},3000);
})
.catch(()=>{
alert("Something went wrong");
});
});

// 3D background animation
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const geometry=new THREE.TorusKnotGeometry(10,3,100,16);
const material=new THREE.MeshBasicMaterial({color:0xc96281,wireframe:true});
const knot=new THREE.Mesh(geometry,material);
scene.add(knot);

camera.position.z=30;

function animate(){
requestAnimationFrame(animate);
knot.rotation.x+=0.01;
knot.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
